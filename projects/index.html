<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>

    <link rel="stylesheet" href="../style.css"> 
</head>
<body>
  <h1>Projects</h1>

  <h3>Projects in predictive modeling, data engineering and visual analytics.</h3>

  <!-- Year breakdown: pie chart + legend -->
  <div class="chart-container">
    <svg id="pieChart" viewBox="-50 -50 100 100"></svg>
    <ul class="legend"></ul>
  </div>

  <!-- Live search across all project text -->
  <input
  class="searchBar"
  type="search"
  aria-label="Search projects"
  placeholder="🔍 Search projects…"
/>

  <!-- Project cards injected via JS -->
  <div class="projects"></div>

  <script type="module" src="../global.js"></script>
  <script type="module" src="projects.js"></script>
</body>
</html>
